<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qualiphy — Plugin Setup Guide</title>
<meta name="description" content="Self-serve setup guide for the Qualiphy WordPress plugin. Get your telehealth consultations live without an onboarding call.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Karla', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fafaf9; color: #1c1917;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeSlide 0.3s ease; }
  code { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #f5f5f4; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  ol li::marker { font-weight: 600; color: #7c3aed; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }

  /* Mobile sidebar */
  @media (max-width: 768px) {
    .guide-layout { flex-direction: column !important; }
    .guide-sidebar {
      width: 100% !important; height: auto !important;
      border-right: none !important; border-bottom: 1px solid #e7e5e4 !important;
      position: relative !important;
    }
    .guide-sidebar nav { 
      display: flex !important; overflow-x: auto !important; 
      padding: 8px !important; gap: 4px !important; flex-wrap: nowrap !important;
    }
    .guide-sidebar nav button { 
      flex-shrink: 0 !important; white-space: nowrap !important; 
      padding: 8px 12px !important;
    }
    .sidebar-footer { display: none !important; }
    .guide-main { height: auto !important; min-height: calc(100vh - 120px); }
    .guide-content { padding: 24px 16px 60px !important; }
    .topbar-pills { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════════════════════════════════════════
   TOKENS
   ═══════════════════════════════════════════════════════════════════════════ */
const C = {
  bg: "#fafaf9", bgWhite: "#ffffff", bgMuted: "#f5f5f4", bgDark: "#1c1917",
  border: "#e7e5e4", borderFocus: "#7c3aed",
  text: "#1c1917", textBody: "#44403c", textMuted: "#78716c", textDim: "#a8a29e",
  accent: "#7c3aed", accentLight: "#ede9fe", accentMid: "#ddd6fe",
  green: "#16a34a", greenLight: "#dcfce7",
  amber: "#d97706", amberLight: "#fef3c7",
  blue: "#2563eb", blueLight: "#dbeafe",
};

/* ═══════════════════════════════════════════════════════════════════════════
   QUALIFYING QUESTIONS
   ═══════════════════════════════════════════════════════════════════════════ */
const QUESTIONS = [
  {
    id: "hasWoo",
    q: "Do you already have WooCommerce installed on your WordPress site?",
    options: [
      { value: "yes", label: "Yes, it's active" },
      { value: "no", label: "Not yet" },
    ],
  },
  {
    id: "examType",
    q: "What type of consultations will you offer?",
    hint: "This determines how the plugin handles pharmacy routing and order flow.",
    options: [
      { value: "rx", label: "Rx Consultations", desc: "Prescriptions with pharmacy fulfillment" },
      { value: "gfe", label: "Good Faith Exams", desc: "Provider clearance for treatments" },
      { value: "both", label: "Both", desc: "Rx consultations and Good Faith Exams" },
    ],
  },
  {
    id: "hasSubscriptions",
    q: "Will patients need recurring consultations (e.g. monthly refills)?",
    hint: "This requires the WooCommerce Subscriptions extension.",
    options: [
      { value: "yes", label: "Yes" },
      { value: "no", label: "No" },
      { value: "unsure", label: "Not sure yet" },
    ],
  },
  {
    id: "hasProducts",
    q: "Do you already have WooCommerce products you want to link to Qualiphy consultations?",
    hint: "The plugin can create new products for you or link to existing ones.",
    options: [
      { value: "yes", label: "Yes, I have existing products" },
      { value: "no", label: "No, I'll create new ones" },
    ],
  },
  {
    id: "hasApiKey",
    q: "Do you have your Qualiphy API key?",
    hint: "Your API key is in the Qualiphy dashboard under Clinic Settings.",
    options: [
      { value: "yes", label: "Yes, I have it" },
      { value: "no", label: "No, I need to get it" },
    ],
  },
];

/* ═══════════════════════════════════════════════════════════════════════════
   SMALL COMPONENTS
   ═══════════════════════════════════════════════════════════════════════════ */

function Logo({ size = 28 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 800 800" fill={C.accent} xmlns="http://www.w3.org/2000/svg">
      <circle cx="420.1" cy="40.1" r="40.1"/>
      <circle cx="207.9" cy="40.1" r="40.1"/>
      <path d="M88.5,189.1l127.6,221.1c17,29.4,45.2,48.9,77.7,54.5v106.6c0,126.1,79.3,228.6,176.8,228.6,97.5,0,176.8-102.6,176.8-228.6v-127c45.3-9.2,79.4-49.3,79.4-97.3,0-54.8-44.5-99.3-99.3-99.3s-99.3,44.5-99.3,99.3c0,48,34.2,88.1,79.4,97.3v127c0,104.2-61.5,188.9-137.1,188.9-75.6,0-137.1-84.7-137.1-188.9v-106.6c32.5-5.7,60.7-25.1,77.7-54.5l127.6-221.1c20.4-35.3,20.4-77.4,0-112.6-20.4-35.3-56.8-56.3-97.5-56.3v39.7c26.3,0,49.9,13.6,63.1,36.4s13.2,50.1,0,72.9l-127.6,221.1c-13.2,22.8-36.8,36.4-63.1,36.4-26.3,0-49.9-13.6-63.1-36.4l-127.6-221.1c-13.2-22.8-13.2-50.1,0-72.9,13.2-22.8,36.8-36.4,63.1-36.4V20.2c-40.7,0-77.2,21-97.5,56.3-20.4,35.3-20.4,77.4,0,112.6Z"/>
    </svg>
  );
}

function Pill({ children, color = C.accent, bg = C.accentLight }) {
  return (
    <span style={{
      display: "inline-block", padding: "3px 10px", borderRadius: 99,
      fontSize: 11, fontWeight: 600, color, background: bg, letterSpacing: "0.02em",
    }}>{children}</span>
  );
}

function StepNum({ n, active, done }) {
  return (
    <div style={{
      width: 32, height: 32, borderRadius: "50%", flexShrink: 0,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: 13, fontWeight: 700,
      background: done ? C.green : active ? C.accent : C.bgMuted,
      color: done || active ? "#fff" : C.textDim,
      transition: "all 0.3s ease",
    }}>
      {done ? "✓" : n}
    </div>
  );
}

function Card({ children, style: s = {} }) {
  return (
    <div style={{
      background: C.bgWhite, border: `1px solid ${C.border}`, borderRadius: 12,
      padding: 24, ...s,
    }}>{children}</div>
  );
}

function Callout({ type = "info", children }) {
  const styles = {
    info:    { bg: C.blueLight,   border: C.blue + "30",   color: C.blue,  icon: "ℹ" },
    tip:     { bg: C.accentLight, border: C.accent + "30", color: C.accent, icon: "💡" },
    warning: { bg: C.amberLight,  border: C.amber + "30",  color: C.amber, icon: "⚠" },
    success: { bg: C.greenLight,  border: C.green + "30",  color: C.green, icon: "✓" },
  };
  const s = styles[type];
  return (
    <div style={{
      padding: "14px 16px", borderRadius: 10, background: s.bg,
      border: `1px solid ${s.border}`, display: "flex", gap: 10, alignItems: "flex-start",
    }}>
      <span style={{ fontSize: 14, flexShrink: 0, marginTop: 1 }}>{s.icon}</span>
      <div style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6 }}>{children}</div>
    </div>
  );
}

function OptionBtn({ selected, onClick, children, desc }) {
  return (
    <button onClick={onClick} style={{
      display: "flex", flexDirection: "column", gap: 3,
      padding: "14px 18px", borderRadius: 10,
      border: `1.5px solid ${selected ? C.accent : C.border}`,
      background: selected ? C.accentLight : C.bgWhite,
      cursor: "pointer", textAlign: "left", width: "100%",
      transition: "all 0.15s ease", fontFamily: "inherit",
    }}>
      <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{children}</span>
      {desc && <span style={{ fontSize: 12, color: C.textMuted }}>{desc}</span>}
    </button>
  );
}

function Btn({ children, onClick, variant = "primary", disabled, small }) {
  const pad = small ? "8px 16px" : "11px 24px";
  const sz = small ? 13 : 14;
  const base = {
    padding: pad, borderRadius: 8, border: "none", cursor: disabled ? "default" : "pointer",
    fontWeight: 600, fontSize: sz, fontFamily: "inherit", display: "inline-flex",
    alignItems: "center", gap: 6, opacity: disabled ? 0.4 : 1, transition: "all 0.15s ease",
  };
  const v = {
    primary:   { ...base, background: C.accent, color: "#fff" },
    secondary: { ...base, background: C.bgMuted, color: C.textBody, border: `1px solid ${C.border}` },
    ghost:     { ...base, background: "transparent", color: C.textMuted, padding: small ? "8px 10px" : "11px 14px" },
  };
  return <button onClick={disabled ? undefined : onClick} style={v[variant]}>{children}</button>;
}

function WizardStep({ n, title, children }) {
  return (
    <div style={{ display: "flex", gap: 12 }}>
      <div style={{
        width: 24, height: 24, borderRadius: 6, flexShrink: 0, marginTop: 1,
        background: C.accentLight, display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 11, fontWeight: 700, color: C.accent,
      }}>{n}</div>
      <div>
        <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{title}</div>
        <div style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, marginTop: 3 }}>{children}</div>
      </div>
    </div>
  );
}

function FlowStep({ n, children }) {
  return (
    <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
      <div style={{
        width: 22, height: 22, borderRadius: "50%", flexShrink: 0,
        background: C.bgMuted, display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 11, fontWeight: 700, color: C.textMuted,
      }}>{n}</div>
      <div style={{ fontSize: 13, color: C.textBody, lineHeight: 1.55, marginTop: 1 }}>{children}</div>
    </div>
  );
}

function CheckItem({ done, children, style: s = {} }) {
  return (
    <div style={{ display: "flex", gap: 10, alignItems: "flex-start", ...s }}>
      <div style={{
        width: 18, height: 18, borderRadius: 4, flexShrink: 0, marginTop: 1,
        border: `1.5px solid ${done ? C.green : C.border}`,
        background: done ? C.greenLight : "transparent",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 11, color: C.green,
      }}>{done ? "✓" : ""}</div>
      <div style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6 }}>{children}</div>
    </div>
  );
}

function AdminPage({ title, path, children }) {
  return (
    <div style={{ paddingLeft: 12, borderLeft: `2px solid ${C.accentMid}` }}>
      <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{title}</div>
      <div style={{ fontSize: 12, color: C.accent, fontFamily: "'SF Mono', 'Fira Code', monospace", margin: "2px 0 4px" }}>{path}</div>
      <div style={{ fontSize: 12, color: C.textMuted, lineHeight: 1.5 }}>{children}</div>
    </div>
  );
}

function SummaryPill({ label, value }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      padding: "4px 10px", borderRadius: 6, background: C.bgMuted,
      fontSize: 11, color: C.textMuted,
    }}>
      {label}: <strong style={{ color: C.textBody }}>{value}</strong>
    </span>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   INTAKE SCREEN
   ═══════════════════════════════════════════════════════════════════════════ */

function IntakeScreen({ onComplete }) {
  const [answers, setAnswers] = useState({});
  const [currentQ, setCurrentQ] = useState(0);

  const q = QUESTIONS[currentQ];
  const allDone = Object.keys(answers).length === QUESTIONS.length;

  const answer = (val) => {
    setAnswers(prev => ({ ...prev, [q.id]: val }));
    if (currentQ < QUESTIONS.length - 1) {
      setTimeout(() => setCurrentQ(currentQ + 1), 150);
    }
  };

  const goBack = () => { if (currentQ > 0) setCurrentQ(currentQ - 1); };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", padding: "40px 20px",
    }}>
      <div style={{ maxWidth: 480, width: "100%" }}>
        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <Logo size={36} />
          <h1 style={{ fontSize: 22, fontWeight: 700, color: C.text, margin: "16px 0 6px", letterSpacing: "-0.02em" }}>
            Plugin Setup Guide
          </h1>
          <p style={{ fontSize: 14, color: C.textMuted, margin: 0, lineHeight: 1.5 }}>
            A few quick questions so we show you exactly what you need.
          </p>
        </div>

        {/* Progress */}
        <div style={{ display: "flex", gap: 4, marginBottom: 28 }}>
          {QUESTIONS.map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 3, borderRadius: 2,
              background: i <= currentQ ? C.accent : C.border,
              transition: "background 0.3s ease",
            }} />
          ))}
        </div>

        {/* Question */}
        <div key={currentQ} className="fade-in">
          <p style={{ fontSize: 11, color: C.textDim, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", margin: "0 0 8px" }}>
            Question {currentQ + 1} of {QUESTIONS.length}
          </p>
          <h2 style={{ fontSize: 18, fontWeight: 700, color: C.text, margin: "0 0 6px", lineHeight: 1.35 }}>
            {q.q}
          </h2>
          {q.hint && (
            <p style={{ fontSize: 13, color: C.textMuted, margin: "0 0 20px", lineHeight: 1.5 }}>{q.hint}</p>
          )}
          {!q.hint && <div style={{ height: 14 }} />}

          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {q.options.map(opt => (
              <OptionBtn key={opt.value} selected={answers[q.id] === opt.value} onClick={() => answer(opt.value)} desc={opt.desc}>
                {opt.label}
              </OptionBtn>
            ))}
          </div>
        </div>

        {/* Nav */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 28 }}>
          <Btn variant="ghost" onClick={goBack} disabled={currentQ === 0} small>← Back</Btn>
          {allDone ? (
            <Btn onClick={() => onComplete(answers)}>Show my setup guide →</Btn>
          ) : currentQ < QUESTIONS.length - 1 && answers[q.id] ? (
            <Btn variant="secondary" onClick={() => setCurrentQ(currentQ + 1)} small>Next →</Btn>
          ) : null}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   GUIDE SCREEN
   ═══════════════════════════════════════════════════════════════════════════ */

function GuideScreen({ answers, onRestart }) {
  const [activeStep, setActiveStep] = useState(0);
  const contentRef = useRef(null);

  const needsRx   = answers.examType === "rx" || answers.examType === "both";
  const needsGfe  = answers.examType === "gfe" || answers.examType === "both";
  const needsSubs = answers.hasSubscriptions === "yes";
  const hasProds  = answers.hasProducts === "yes";
  const needsWoo  = answers.hasWoo === "no";
  const needsKey  = answers.hasApiKey === "no";

  const scrollTop = useCallback(() => {
    if (contentRef.current) contentRef.current.scrollTop = 0;
  }, []);

  // ── Build steps dynamically ────────────────────────────────────────────
  const steps = [];

  // 0 — Prerequisites (only if no WooCommerce)
  if (needsWoo) {
    steps.push({ id: "prereqs", title: "Install Prerequisites", render: () => (
      <>
        <p>Before installing the Qualiphy plugin, you need WooCommerce running on your WordPress site.</p>
        <Card>
          <h4 style={{ margin: "0 0 12px", fontSize: 14 }}>Required</h4>
          <CheckItem done={false}>
            <strong>WooCommerce</strong> — Go to Plugins → Add New, search for "WooCommerce", install and activate it. Run the WooCommerce setup wizard to configure basic store settings.
          </CheckItem>
          <CheckItem done={false} style={{ marginTop: 10 }}>
            <strong>SSL Certificate</strong> — Your site must use HTTPS. Most hosts provide free SSL. The plugin checks this during setup.
          </CheckItem>
          {needsSubs && (
            <>
              <h4 style={{ margin: "16px 0 12px", fontSize: 14 }}>Recommended</h4>
              <CheckItem done={false}>
                <strong>WooCommerce Subscriptions</strong> — Required for recurring consultations. Purchase from the WooCommerce marketplace and install it.
              </CheckItem>
            </>
          )}
        </Card>
        <Callout type="tip">
          If you already have a payment gateway (Stripe, PayPal, etc.) configured, you're all set. If not, the plugin setup will remind you that you need one to accept payments for paid consultations.
        </Callout>
      </>
    )});
  }

  // 1 — Install
  steps.push({ id: "install", title: "Install & Activate", render: () => (
    <>
      <p>Upload the Qualiphy plugin to your WordPress site. The setup wizard launches automatically on activation.</p>
      <Card>
        <ol style={{ margin: 0, paddingLeft: 20, display: "flex", flexDirection: "column", gap: 12 }}>
          <li style={{ fontSize: 14, lineHeight: 1.6, color: C.textBody }}>
            In your WordPress admin, go to <strong>Plugins → Add New → Upload Plugin</strong>
          </li>
          <li style={{ fontSize: 14, lineHeight: 1.6, color: C.textBody }}>
            Upload the <code>qualiphy.zip</code> file and click <strong>Install Now</strong>
          </li>
          <li style={{ fontSize: 14, lineHeight: 1.6, color: C.textBody }}>
            Click <strong>Activate Plugin</strong> — the setup wizard opens immediately
          </li>
        </ol>
      </Card>
      <Callout type="info">
        If you navigate away from the wizard, a yellow notice bar reminds you to complete setup. You can always return via <strong>Qualiphy → Setup Wizard</strong> in the sidebar.
      </Callout>
    </>
  )});

  // 2 — Terms & Requirements
  steps.push({ id: "terms", title: "Terms & Requirements", render: () => (
    <>
      <p>The first two wizard screens verify your environment and ask you to accept the terms of service.</p>
      <Card>
        <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Welcome Screen</h4>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: "0 0 16px" }}>
          Scroll through the terms and conditions to the bottom, then click <strong>I Accept Terms</strong>.
        </p>
        <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Requirements Check</h4>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: 0 }}>
          The wizard verifies SSL and WooCommerce are active. It also shows the status of optional plugins (WooCommerce Subscriptions and WooPayments). Green checkmarks mean you're good — click <strong>Continue</strong>.
        </p>
      </Card>
      {needsSubs && (
        <Callout type="warning">
          Since you want recurring consultations, make sure WooCommerce Subscriptions shows a green checkmark on the requirements screen. If it shows as optional/inactive, install it before continuing.
        </Callout>
      )}
    </>
  )});

  // 3 — Branding
  steps.push({ id: "branding", title: "Upload Branding", render: () => (
    <>
      <p>Add your clinic's logo and brand colors. These appear on patient-facing screens — the exam launch modal, consultation emails, and product pages.</p>
      <Card>
        <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Logo</h4>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: "0 0 16px" }}>
          Upload a PNG or JPEG. You can set separate versions for light and dark backgrounds. PNG with transparent background works best.
        </p>
        <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Accent Colors</h4>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: 0 }}>
          Pick a <strong>primary</strong> and <strong>secondary</strong> color for buttons, highlights, and the consultation UI. Use your existing brand colors.
        </p>
      </Card>
      <Callout type="tip">
        You can change these later under <strong>Qualiphy → Settings → Branding</strong>. Pick something close now and refine after launch.
      </Callout>
    </>
  )});

  // 4 — API Key
  steps.push({ id: "connect", title: "Connect API Key", render: () => (
    <>
      <p>This links your WordPress store to the Qualiphy platform. Your API key authenticates all communication between the plugin and Qualiphy's servers.</p>
      {needsKey ? (
        <Callout type="warning">
          <strong>You need your API key before this step.</strong> Log in to <strong>app.qualiphy.me</strong>, go to <strong>Clinic Settings</strong>, and copy your API key. If you have multiple locations, each one has its own key — use the key for the location this site serves.
        </Callout>
      ) : (
        <Callout type="success">
          You have your API key ready — paste it in and the plugin verifies it automatically.
        </Callout>
      )}
      <Card style={{ marginTop: 12 }}>
        <ol style={{ margin: 0, paddingLeft: 20, display: "flex", flexDirection: "column", gap: 10 }}>
          <li style={{ fontSize: 14, lineHeight: 1.6, color: C.textBody }}>Paste your API key into the field</li>
          <li style={{ fontSize: 14, lineHeight: 1.6, color: C.textBody }}>Click <strong>Verify & Continue</strong></li>
          <li style={{ fontSize: 14, lineHeight: 1.6, color: C.textBody }}>The plugin syncs your consultations, pharmacies, and exam data automatically</li>
        </ol>
      </Card>
      <Callout type="info">
        Your key is encrypted with AES-256 and stored securely. It cannot be viewed after saving — only replaced.
      </Callout>
    </>
  )});

  // 5 — Service Area
  steps.push({ id: "states", title: "Set Service Area", render: () => (
    <>
      <p>Select which U.S. states you accept consultations from. This controls the states available at checkout and creates a WooCommerce shipping zone automatically.</p>
      <Card>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: "0 0 12px" }}>
          Click the checkbox next to each state, or use <strong>Select All</strong> to enable all 48 available states. Alabama and Mississippi are currently unavailable.
        </p>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: 0 }}>
          Patients in unselected states see a <em>"not available in your area"</em> message at checkout.
        </p>
      </Card>
      {needsRx && (
        <Callout type="tip">
          For Rx consultations, your pharmacy coverage may not span all states. Only select states where your pharmacies can fulfill. Check coverage on the <strong>Pharmacies</strong> page after setup.
        </Callout>
      )}
    </>
  )});

  // 6 — Import Consultations
  steps.push({ id: "exams", title: "Import Consultations", render: () => {
    let wizStepNum = 1;
    return (
      <>
        <p>This is the most important step. Your Qualiphy consultations appear as a grid. You'll create WooCommerce products from them using the import wizard.</p>
        <Card>
          <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>The Consultation Grid</h4>
          <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: "0 0 12px" }}>
            Each card shows a consultation name, its type ({needsRx && needsGfe ? "Rx or GFE" : needsRx ? "Rx" : "GFE"}), and the Qualiphy cost. A checkmark appears on consultations that already have a linked product.
          </p>
          <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: 0 }}>
            Click any card to open it, then click the import button to launch the product wizard.
          </p>
        </Card>

        <Card style={{ marginTop: 12 }}>
          <h4 style={{ margin: "0 0 12px", fontSize: 14 }}>The Import Wizard</h4>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

            {hasProds ? (
              <WizardStep n={wizStepNum++} title="Create New or Link Existing">
                You'll see the option to <strong>Link Existing Product</strong> — this connects your existing WooCommerce product to the consultation and reconfigures it. Or choose <strong>Create New Product</strong> to start fresh.
              </WizardStep>
            ) : (
              <WizardStep n={wizStepNum++} title="Create New Product">
                The wizard creates a new WooCommerce product linked to this consultation. Title, description, images, and metadata are set automatically.
              </WizardStep>
            )}

            {needsSubs && (
              <WizardStep n={wizStepNum++} title="Product Type">
                Choose <strong>One-Time</strong> (simple product) or <strong>Subscription</strong> (recurring). For monthly refills, choose Subscription — billing intervals are configured in the pricing step.
              </WizardStep>
            )}

            <WizardStep n={wizStepNum++} title="Free or Paid Checkout">
              Choose whether this is <strong>free</strong> (instant checkout, no payment) or <strong>standard pricing</strong> (patient pays). Free consultations skip pricing entirely.
            </WizardStep>

            {needsRx && (
              <WizardStep n={wizStepNum++} title="Pharmacy Selection">
                For Rx consultations, you'll see pharmacies that can fulfill this exam. Multiple pharmacies with different packages become <strong>product variations</strong> (e.g., "Semaglutide 0.25mg", "0.5mg"). Each variation links to a specific pharmacy.
              </WizardStep>
            )}

            <WizardStep n={wizStepNum++} title="Pricing">
              Set the patient-facing price. The wizard shows the Qualiphy cost alongside your price so you can see margin. Set a <strong>return fee</strong> — the amount retained if a consultation is deferred.
              {needsSubs && <span> For subscriptions, also set the <strong>billing frequency</strong> (e.g., every 1 month).</span>}
            </WizardStep>

            <WizardStep n="✓" title="Review & Publish">
              Review everything, then <strong>Save as Draft</strong> (preview first) or <strong>Publish</strong> (live immediately).
            </WizardStep>
          </div>
        </Card>

        <Callout type="tip">
          Repeat for each consultation. The grid checkmark tells you which ones already have products.
        </Callout>
      </>
    );
  }});

  // 7 — Settings
  steps.push({ id: "settings", title: "Configure Settings", render: () => (
    <>
      <p>The final wizard screen configures operational settings. Here's what matters for your setup:</p>
      <Card>
        <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Clinical Access</h4>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: "0 0 16px" }}>
          Choose which WordPress users can view patient order data. The admin running setup gets access automatically. Add clinical staff — non-clinical users won't see patient details on orders.
        </p>
        <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Email Notifications</h4>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: "0 0 16px" }}>
          Configure which email addresses receive admin notifications (e.g., exam invite failures). Separate from patient-facing emails which go out automatically.
        </p>
        <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Auto Refund Settings</h4>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: 0 }}>
          When a consultation is deferred, the plugin can automatically refund minus a return fee. The <strong>default return fee</strong> is the amount your clinic keeps for the telehealth visit.
        </p>
      </Card>
      {needsRx && (
        <Callout type="info">
          Default return fee is $30. A deferred $150 Rx consultation refunds $120 to the patient and retains $30. Override per-product later.
        </Callout>
      )}
      {needsGfe && !needsRx && (
        <Callout type="info">
          Deferred GFE consultations are less common since the provider is clearing the patient for your treatment. The auto-refund is still there as a safety net.
        </Callout>
      )}
    </>
  )});

  // 8 — Post Setup
  steps.push({ id: "postsetup", title: "After Setup", render: () => (
    <>
      <p>Setup is complete. Here's what you should know about day-to-day operations.</p>

      <Card>
        <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>How a consultation works end-to-end</h4>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 4 }}>
          <FlowStep n="1">Patient finds the consultation product and adds it to cart</FlowStep>
          <FlowStep n="2">Checkout collects gender, date of birth, and phone number</FlowStep>
          <FlowStep n="3">After payment, an exam invite fires to Qualiphy automatically</FlowStep>
          <FlowStep n="4">Thank-you page shows a popup to connect with a provider</FlowStep>
          {needsRx ? (
            <>
              <FlowStep n="5">Provider reviews and writes a prescription</FlowStep>
              <FlowStep n="6">Pharmacy fulfills and ships — tracking updates your order</FlowStep>
              <FlowStep n="7">Order auto-completes when delivered</FlowStep>
            </>
          ) : (
            <>
              <FlowStep n="5">Provider reviews and approves the consultation</FlowStep>
              <FlowStep n="6">Order auto-completes on approval</FlowStep>
            </>
          )}
        </div>
      </Card>

      <Card style={{ marginTop: 12 }}>
        <h4 style={{ margin: "0 0 12px", fontSize: 14 }}>Key admin pages</h4>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <AdminPage title="Dashboard" path="Qualiphy → Dashboard">
            Overview, quick links, and news.
          </AdminPage>
          <AdminPage title="Consultations" path="Qualiphy → Consultations">
            Manage, sync, and import consultations. Add new products here when you create new exams in Qualiphy.
          </AdminPage>
          {needsRx && (
            <AdminPage title="Pharmacies" path="Qualiphy → Pharmacies">
              View pharmacies, state coverage, and configure routing rules per exam per state.
            </AdminPage>
          )}
          <AdminPage title="Settings" path="Qualiphy → Settings">
            General, checkout behavior, language customization, email notifications, branding, and advanced options.
          </AdminPage>
        </div>
      </Card>

      {needsSubs && (
        <Card style={{ marginTop: 12 }}>
          <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Subscription behavior</h4>
          <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: 0 }}>
            On renewal, the plugin sends a new exam invite automatically. If a renewal consultation is deferred, the subscription can be cancelled or put on hold (configurable in Settings → General).
          </p>
        </Card>
      )}

      {needsRx && (
        <Card style={{ marginTop: 12 }}>
          <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Dose questionnaire (returning patients)</h4>
          <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: 0 }}>
            For products with multiple dose variations, enable the <strong>Questionnaire</strong> on the product edit page. This replaces the dropdown with a guided flow: "Have you taken this before?" → "Current dose" → "Stay, increase, or decrease." Customize text and colors in Settings → Language.
          </p>
        </Card>
      )}

      <Callout type="success">
        Your store is ready. Need help? <strong>support@qualiphy.me</strong> or <strong>(424) 320-9958</strong>.
      </Callout>
    </>
  )});

  // ── Render ─────────────────────────────────────────────────────────────
  return (
    <div className="guide-layout" style={{ display: "flex", height: "100vh" }}>

      {/* Sidebar */}
      <aside className="guide-sidebar" style={{
        width: 280, flexShrink: 0, background: C.bgWhite, borderRight: `1px solid ${C.border}`,
        display: "flex", flexDirection: "column", overflow: "hidden",
      }}>
        <div style={{ padding: "20px 20px 16px", borderBottom: `1px solid ${C.border}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Logo size={24} />
            <span style={{ fontSize: 15, fontWeight: 700, color: C.text }}>Qualiphy</span>
          </div>
          <p style={{ fontSize: 12, color: C.textMuted, margin: "8px 0 0" }}>Plugin Setup Guide</p>
        </div>

        <nav style={{ flex: 1, overflow: "auto", padding: "12px 12px" }}>
          {steps.map((step, i) => (
            <button key={step.id} onClick={() => { setActiveStep(i); scrollTop(); }} style={{
              display: "flex", alignItems: "flex-start", gap: 10,
              width: "100%", padding: "10px 10px", borderRadius: 8, border: "none",
              background: i === activeStep ? C.accentLight : "transparent",
              cursor: "pointer", textAlign: "left", fontFamily: "inherit",
              transition: "background 0.15s ease", marginBottom: 2,
            }}>
              <StepNum n={i + 1} active={i === activeStep} done={i < activeStep} />
              <span style={{
                fontSize: 13, fontWeight: i === activeStep ? 600 : 500,
                color: i === activeStep ? C.accent : i < activeStep ? C.green : C.textBody,
                lineHeight: 1.35, marginTop: 5,
              }}>{step.title}</span>
            </button>
          ))}
        </nav>

        <div className="sidebar-footer" style={{ padding: "12px 16px", borderTop: `1px solid ${C.border}`, display: "flex", flexDirection: "column", gap: 6 }}>
          <Btn variant="ghost" onClick={onRestart} small>← Restart guide</Btn>
          <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.4 }}>
            Need help? <strong style={{ color: C.textMuted }}>support@qualiphy.me</strong>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main className="guide-main" ref={contentRef} style={{ flex: 1, overflow: "auto" }}>
        <div style={{
          position: "sticky", top: 0, zIndex: 10, padding: "14px 32px",
          background: C.bg + "ee", backdropFilter: "blur(8px)",
          borderBottom: `1px solid ${C.border}`,
          display: "flex", alignItems: "center", justifyContent: "space-between",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Pill>{steps[activeStep].title}</Pill>
            <span style={{ fontSize: 12, color: C.textDim }}>Step {activeStep + 1} of {steps.length}</span>
          </div>
          <div className="topbar-pills" style={{ display: "flex", gap: 4 }}>
            <SummaryPill label="Type" value={answers.examType === "both" ? "Rx + GFE" : answers.examType?.toUpperCase()} />
            {needsSubs && <SummaryPill label="Subscriptions" value="Yes" />}
          </div>
        </div>

        <div key={activeStep} className="fade-in guide-content" style={{ maxWidth: 680, margin: "0 auto", padding: "32px 32px 80px" }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: C.text, margin: "0 0 8px", letterSpacing: "-0.02em" }}>
            {steps[activeStep].title}
          </h2>
          <div style={{ fontSize: 14, color: C.textBody, lineHeight: 1.7, display: "flex", flexDirection: "column", gap: 16 }}>
            {steps[activeStep].render()}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 40, paddingTop: 24, borderTop: `1px solid ${C.border}` }}>
            <Btn variant="secondary" onClick={() => { setActiveStep(Math.max(0, activeStep - 1)); scrollTop(); }} disabled={activeStep === 0}>
              ← Previous
            </Btn>
            {activeStep < steps.length - 1 ? (
              <Btn onClick={() => { setActiveStep(activeStep + 1); scrollTop(); }}>
                Next: {steps[activeStep + 1].title} →
              </Btn>
            ) : (
              <Btn onClick={() => window.open("https://app.qualiphy.me", "_blank")}>
                Go to Qualiphy Dashboard →
              </Btn>
            )}
          </div>
        </div>
      </main>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   APP ROOT
   ═══════════════════════════════════════════════════════════════════════════ */

function App() {
  const [screen, setScreen] = useState("intake");
  const [answers, setAnswers] = useState(null);

  if (screen === "intake") {
    return <IntakeScreen onComplete={(a) => { setAnswers(a); setScreen("guide"); }} />;
  }
  return <GuideScreen answers={answers} onRestart={() => { setAnswers(null); setScreen("intake"); }} />;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
